name: Whispur
options:
  bundleIdPrefix: ai.sophiie
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Whispur:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sophiie.whispur
        PRODUCT_NAME: Whispur
        MARKETING_VERSION: "0.6.2" # x-release-please-version
        CURRENT_PROJECT_VERSION: "100"
        CODE_SIGN_ENTITLEMENTS: Whispur.entitlements
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Whispur
        CFBundleName: Whispur
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSMicrophoneUsageDescription: "Whispur uses your microphone only when you start dictation, so it can capture speech and turn it into text."
        NSSpeechRecognitionUsageDescription: "Whispur uses Apple's speech recognition when you choose the on-device Apple provider for local dictation."
        NSAccessibilityUsageDescription: "Whispur uses Accessibility access to detect the focused text field and paste your transcript back where you're typing."
        NSHumanReadableCopyright: "© 2026 Sophiie AI Pty Ltd. All rights reserved."
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        SUFeedURL: https://whispur.app/appcast.xml
        SUPublicEDKey: c4knNUUEnIKOq4/QeFU9yts+swIKnXQetWKjZnkZ2eg=

  WhispurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Whispur
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sophiie.whispur.tests
        GENERATE_INFOPLIST_FILE: YES
